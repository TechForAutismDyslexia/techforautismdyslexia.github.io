name: Build TotalSolutionsFrontend Testing Branch

env:
  CI: false

on:
  workflow_call:
    inputs:
      reponame:
        required: false
        default: 'root'
        type: string
    secrets:
      TAD_ORG_BOT_ID:
        required: true
      TAD_ORG_BOT_PEM:
        required: true

  workflow_dispatch:
    inputs:
      reponame:
        description: 'Subroute of repo to build'
        required: false
        default: 'root'
        type: string

permissions:
  contents: write

jobs:
  build-repo:
    runs-on: ubuntu-latest
    environment: env_test

    steps:
      - name: Debug secret presence
        run: |
            if [ -z "${{ secrets.TAD_ORG_BOT_ID }}" ]; then
              echo "APP ID is EMPTY ❌"
              exit 1
            else
              echo "APP ID exists ✅"
            fi
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TAD_ORG_BOT_ID }}
          private-key: ${{ secrets.TAD_ORG_BOT_PEM }}
          owner: TechForAutismDyslexia

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install Fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Set Execute Permission
        run: chmod +x .github/build.fish

      - name: Build
        run: |
          export ACCESS_TOKEN=${{ steps.app-token.outputs.token }}
          cd .github && fish ./build.fish ${{ inputs.reponame }}
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Commit & Push
        run: |
          git config --global user.name "tad-org-bot[bot]"
          git config --global user.email "tad-org-bot[bot]@users.noreply.github.com"

          cp -r .github/site/* .
          rm -rf .github/site

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Portal Build (automated)"
          git push
